[package]
name = "jeremy84100/ratelimiter"
version = "3.2.5"
description = "Hardened, zero-allocation O(1) RateLimiter engine for Roblox."
authors = ["IFloXieI <https://github.com/Jeremy84100>"]
license = "MIT"
realm = "server"
registry = "https://github.com/UpliftGames/wally-index"

# Point directly to the core folder
main = "RateLimiter/init.lua"

# Exclude non-essential files
exclude = [
    "RateLimiter/shared/**",
    "RateLimiter/server/**",
    "RateLimiter/client/**",
    ".agents/**",
    ".gemini/**",
    "skills-lock.json",
    "default.project.json",
    "aftman.toml",
    "*.lock",
    ".github/**",
    "tests/**"
]

[dependencies]
