[package]
name = "jeremy84100/ratelimiter"
version = "3.2.2"
description = "Hardened, zero-allocation O(1) RateLimiter engine for Roblox."
authors = ["IFloXieI <https://github.com/Jeremy84100>"]
license = "MIT"
realm = "server"
registry = "https://github.com/UpliftGames/wally-index"

# Entry point for the package
main = "src/init.lua"

# Exclude all non-essential files to keep the package clean
exclude = [
    "src/shared",
    "src/server",
    "src/client",
    ".agents",
    ".gemini",
    "skills-lock.json",
    "default.project.json",
    "aftman.toml",
    "*.lock",
    ".github",
    "tests"
]

[dependencies]

