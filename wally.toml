[package]
name = "ifloxiei/ratelimiter"
version = "3.2.0"
description = "Hardened, zero-allocation O(1) RateLimiter engine for Roblox."
authors = ["IFloXieI <https://github.com/Jeremy84100>"]
license = "MIT"
realm = "server"
registry = "https://github.com/UpliftGames/wally-index"

# Entry point for the package
main = "src/RateLimiter/init.lua"

# Exclude development/test files from the final package
exclude = [
    "src/shared/**",
    ".agents/**",
    ".gemini/**",
    "skills-lock.json",
    "default.project.json",
    "aftman.toml"
]

